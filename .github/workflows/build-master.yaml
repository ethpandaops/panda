name: Build Master Images

on:
  push:
    branches: [master]

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    uses: ./.github/workflows/build-and-push.yaml
    with:
      version: master-${{ needs.meta.outputs.short-sha }}
      server-tags: server-master-${{ needs.meta.outputs.short-sha }},server-master-latest
      cli-tags: master-${{ needs.meta.outputs.short-sha }},master-latest
      proxy-tags: proxy-master-${{ needs.meta.outputs.short-sha }},proxy-master-latest
      sandbox-tags: sandbox-master-${{ needs.meta.outputs.short-sha }},sandbox-master-latest
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
