name: Build Master Images

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on:
      - self-hosted-ghr
      - size-l-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build binaries
        env:
          SHA: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          SHORT_SHA=${SHA::7}
          LDFLAGS="-s -w \
            -X github.com/ethpandaops/panda/internal/version.Version=master-${SHORT_SHA} \
            -X github.com/ethpandaops/panda/internal/version.GitCommit=${SHA} \
            -X github.com/ethpandaops/panda/internal/version.BuildTime=${BUILD_TIME}"

          for GOARCH in amd64 arm64; do
            PLATFORM="linux/${GOARCH}"
            mkdir -p "${PLATFORM}"
            echo "Building for ${PLATFORM}..."
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-server" ./cmd/server
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda" ./cmd/panda
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-proxy" ./cmd/proxy
          done

      - name: Build and push server image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.server.Dockerfile \
            --tag ethpandaops/panda:server-master \
            --tag ethpandaops/panda:server-master-latest \
            --push .

      - name: Build and push CLI image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.panda.Dockerfile \
            --tag ethpandaops/panda:master \
            --tag ethpandaops/panda:master-latest \
            --push .

      - name: Build and push proxy image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.proxy.Dockerfile \
            --tag ethpandaops/panda:proxy-master \
            --tag ethpandaops/panda:proxy-master-latest \
            --push .
