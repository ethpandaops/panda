name: Build PR Images

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'build') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted-ghr
      - size-l-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build binaries
        env:
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w \
            -X github.com/ethpandaops/panda/internal/version.Version=pr-${PR} \
            -X github.com/ethpandaops/panda/internal/version.GitCommit=${SHA} \
            -X github.com/ethpandaops/panda/internal/version.BuildTime=${BUILD_TIME}"

          for GOARCH in amd64 arm64; do
            PLATFORM="linux/${GOARCH}"
            mkdir -p "${PLATFORM}"
            echo "Building for ${PLATFORM}..."
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-server" ./cmd/server
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda" ./cmd/panda
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-proxy" ./cmd/proxy
          done

      - name: Build and push server image
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.server.Dockerfile \
            --tag ethpandaops/panda:server-pr-${PR} \
            --push .

      - name: Build and push CLI image
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.panda.Dockerfile \
            --tag ethpandaops/panda:pr-${PR} \
            --push .

      - name: Build and push proxy image
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.proxy.Dockerfile \
            --tag ethpandaops/panda:proxy-pr-${PR} \
            --push .

      - name: Comment PR with image tags
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ github.event.pull_request.number }};
            const body = [
              '### Docker images built',
              '',
              '| Component | Image |',
              '|-----------|-------|',
              `| Server | \`ethpandaops/panda:server-pr-${pr}\` |`,
              `| CLI | \`ethpandaops/panda:pr-${pr}\` |`,
              `| Proxy | \`ethpandaops/panda:proxy-pr-${pr}\` |`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.data.find(c =>
              c.body.includes('Docker images built')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
