name: Build PR Images

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'build') && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/build-and-push.yaml
    with:
      version: pr-${{ github.event.pull_request.number }}
      server-tags: server-pr-${{ github.event.pull_request.number }}
      cli-tags: pr-${{ github.event.pull_request.number }}
      proxy-tags: proxy-pr-${{ github.event.pull_request.number }}
      sandbox-tags: sandbox-pr-${{ github.event.pull_request.number }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  comment:
    needs: build
    if: contains(github.event.pull_request.labels.*.name, 'build') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR with image tags
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ github.event.pull_request.number }};
            const body = [
              '### Docker images built',
              '',
              '| Component | Image |',
              '|-----------|-------|',
              `| Server | \`ethpandaops/panda:server-pr-${pr}\` |`,
              `| CLI | \`ethpandaops/panda:pr-${pr}\` |`,
              `| Proxy | \`ethpandaops/panda:proxy-pr-${pr}\` |`,
              `| Sandbox | \`ethpandaops/panda:sandbox-pr-${pr}\` |`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.data.find(c =>
              c.body.includes('Docker images built')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
