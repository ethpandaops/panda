name: LLM Evaluation

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model to evaluate'
        required: true
        default: 'claude-sonnet-4-5'
        type: choice
        options:
          - claude-sonnet-4-5
          - claude-opus-4-5
          - claude-haiku-4-5
      category:
        description: 'Test category (empty for all)'
        required: false
        type: string
      markers:
        description: 'pytest markers (e.g., "visualization" or "not slow")'
        required: false
        type: string
      verbose:
        description: 'Enable verbose output'
        required: false
        default: false
        type: boolean

  schedule:
    # Run daily at 6am UTC with Sonnet
    - cron: '0 6 * * *'

  # Allow triggering from other workflows
  workflow_call:
    inputs:
      model:
        required: false
        default: 'claude-sonnet-4-5'
        type: string

jobs:
  evaluate:
    runs-on:
      - self-hosted-ghr
      - size-m-x64
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        working-directory: tests/eval
        run: uv sync

      - name: Build server
        run: go build -o panda-server ./cmd/server

      - name: Build proxy
        run: go build -o panda-proxy ./cmd/proxy

      - name: Download semantic search assets
        run: make download-models

      - name: Create CI configs
        run: |
          cat > proxy-config.ci.yaml << 'EOF'
          server:
            listen_addr: ":18081"

          auth:
            mode: none

          clickhouse:
            - name: xatu
              description: "Main Xatu ClickHouse cluster"
              host: "${{ secrets.CLICKHOUSE_XATU_HOST }}"
              port: 8443
              database: default
              username: "${{ secrets.CLICKHOUSE_XATU_USERNAME }}"
              password: "${{ secrets.CLICKHOUSE_XATU_PASSWORD }}"
              secure: true
            - name: xatu-cbt
              description: "Pre-aggregated CBT ClickHouse cluster"
              host: "${{ secrets.CLICKHOUSE_CBT_HOST }}"
              port: 8443
              database: default
              username: "${{ secrets.CLICKHOUSE_CBT_USERNAME }}"
              password: "${{ secrets.CLICKHOUSE_CBT_PASSWORD }}"
              secure: true

          s3:
            endpoint: "${{ secrets.S3_ENDPOINT }}"
            access_key: "${{ secrets.S3_ACCESS_KEY_ID }}"
            secret_key: "${{ secrets.S3_SECRET_ACCESS_KEY }}"
            bucket: "${{ secrets.S3_BUCKET }}"
            region: "${{ secrets.S3_REGION }}"
          EOF

          cat > config.ci.yaml << 'EOF'
          server:
            host: "0.0.0.0"
            port: 2480
            base_url: "http://127.0.0.1:2480"
            sandbox_url: "http://127.0.0.1:2480"

          modules:
            clickhouse:
              schema_discovery:
                datasources:
                  - name: "xatu"
                  - name: "xatu-cbt"

          sandbox:
            backend: docker
            image: "ethpandaops/panda:sandbox-latest"
            network: "host"

          proxy:
            url: "http://127.0.0.1:18081"

          semantic_search:
            model_path: "models/all-MiniLM-L6-v2"
          EOF

      - name: Start proxy
        run: |
          ./panda-proxy --config proxy-config.ci.yaml &
          for i in {1..30}; do
            if curl -s http://localhost:18081/health > /dev/null 2>&1; then
              echo "Proxy is ready"
              break
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 2
          done

      - name: Start server
        run: |
          ./panda-server serve --config config.ci.yaml &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:2480/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run evaluation
        working-directory: tests/eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MCP_EVAL_MCP_URL: http://localhost:2480
          MCP_EVAL_MODEL: ${{ inputs.model || 'claude-sonnet-4-5' }}
          MCP_EVAL_VERBOSE: ${{ inputs.verbose || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # For DeepEval metrics
        run: |
          PYTEST_ARGS="tests/"

          if [ -n "${{ inputs.category }}" ]; then
            PYTEST_ARGS="$PYTEST_ARGS -k '${{ inputs.category }}'"
          fi

          if [ -n "${{ inputs.markers }}" ]; then
            PYTEST_ARGS="$PYTEST_ARGS -m '${{ inputs.markers }}'"
          fi

          if [ "${{ inputs.verbose }}" = "true" ]; then
            PYTEST_ARGS="$PYTEST_ARGS -v -s"
          fi

          # Run pytest with JUnit XML output for GitHub Actions
          uv run python -m pytest $PYTEST_ARGS \
            --junitxml=reports/junit.xml \
            --tb=short \
            || true  # Don't fail immediately, we want to upload results

      - name: Generate report
        if: always()
        working-directory: tests/eval
        run: |
          mkdir -p reports
          # Generate summary if we have results
          if [ -f reports/junit.xml ]; then
            echo "# Evaluation Results" > reports/summary.md
            echo "" >> reports/summary.md
            echo "**Model:** ${{ inputs.model || 'claude-sonnet-4-5' }}" >> reports/summary.md
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> reports/summary.md
            echo "" >> reports/summary.md
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ inputs.model || 'claude-sonnet-4-5' }}-${{ github.run_id }}
          path: |
            tests/eval/reports/
            tests/eval/snapshots/
          retention-days: 30

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: tests/eval/reports/junit.xml
          check_name: "LLM Evaluation Results (${{ inputs.model || 'claude-sonnet-4-5' }})"
          comment_mode: always

  compare-models:
    runs-on:
      - self-hosted-ghr
      - size-m-x64
    needs: evaluate
    if: github.event_name == 'workflow_dispatch' && inputs.model == 'claude-sonnet-4-5'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Sonnet results
        uses: actions/download-artifact@v4
        with:
          name: eval-results-claude-sonnet-4-5-${{ github.run_id }}
          path: results/sonnet

      - name: Summary
        run: |
          echo "## Model Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results from evaluation run:" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ inputs.model || 'claude-sonnet-4-5' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
