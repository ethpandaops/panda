# Minimal server config
# ep itself only needs server.url in its own client config

server:
  host: "0.0.0.0"
  port: 2480
  base_url: "http://localhost:2480"
  sandbox_url: "http://ethpandaops-panda-server:2480"

sandbox:
  backend: docker
  image: "ethpandaops-panda-sandbox:latest"
  timeout: 600
  memory_limit: "2g"
  cpu_limit: 1.0
  network: "ethpandaops-panda-internal"
  host_shared_path: "/tmp/ethpandaops-panda-sandbox"
  sessions:
    max_sessions: 50
    ttl: 10m
    max_duration: 1h

proxy:
  url: "http://ethpandaops-panda-proxy:18081"

observability:
  metrics_enabled: true
